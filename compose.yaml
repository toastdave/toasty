services:
  postgres:
    image: postgres:17-alpine
    container_name: toasty-postgres
    environment:
      POSTGRES_DB: toasty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '1802:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d toasty']
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: toasty-web
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/toasty
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '1801:1801'
    volumes:
      - .:/app
      - /app/node_modules
    command: bun run --cwd apps/web dev -- --host 0.0.0.0 --port 1801

volumes:
  postgres-data:
